<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фреймовая структура</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }
        .iframe-container {
            display: flex;
            height: 100vh;
        }
        #menu-frame {
            width: 200px;
            height: 100vh;
            border: none;
        }
        #content-frame {
            width: 800px;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe
            id="menu-frame"
            name="menu"
            src="menu.html"
            title="Меню"
        ></iframe>
        <iframe
            id="content-frame"
            name="content"
            src="content.html"
            title="Контент"
        ></iframe>
    </div>
</body>
</html>
